name: Daily personnel crawler

on:
  schedule:
    - cron: "0 1 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-personnel-crawler
  cancel-in-progress: false

jobs:
  run-personnel-crawler:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 urllib3 google-generativeai

      - name: Create secret files
        run: |
          printf "%s" "${GEMINI_API_KEY}" > secret.txt
          printf "%s\n%s\n" "${NAVER_CLIENT_ID}" "${NAVER_CLIENT_SECRET}" > secret_naver.txt
          test -s secret.txt
          test -s secret_naver.txt
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run personnel crawler
        run: |
          python crawler-personnel.py
